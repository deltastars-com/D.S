[build]
  command = "cd delta-stars-v2 && npm run build"
  publish = "delta-stars-v2/dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "delta-stars-v2/supabase/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
