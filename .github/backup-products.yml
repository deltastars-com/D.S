name: Backup Products from Supabase to Netlify Blobs

on:
  schedule:
    - cron: '0 */6 * * *'   # كل 6 ساعات (يمكنك تغيير التوقيت)
  workflow_dispatch:         # يسمح بالتشغيل اليدوي من واجهة GitHub Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @supabase/supabase-js @netlify/blobs

      - name: Run backup script
        run: node .github/scripts/backup-products.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NETLIFY_BLOBS_TOKEN: ${{ secrets.NETLIFY_BLOBS_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}   # رابط موقعك على Netlify (مثل https://deltastars.netlify.app)